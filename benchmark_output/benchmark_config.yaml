data:
  external:
    region_a_path: null
    region_b_path: null
    timestamp_col: timestamp
  features:
    columns:
    - temperature
    - humidity
    - rainfall
    - evapotranspiration
    - soil_moisture
    target: next_day_soil_moisture
  source: synthetic
  synthetic:
    length: 800
    region_seed_offset: 1
evaluation:
  degradation_baseline: A
  missing_frac: 0.05
  noise_std: 0.1
  runs: 1
  target_region: B
model:
  linear:
    fit_intercept: true
    n_jobs: -1
  lstm:
    dropout: 0.2
    hidden_size: 64
    num_layers: 2
  rf:
    max_depth: null
    n_estimators: 300
  type: linear
preprocessing:
  leakage_std_tolerance: 3.0
  leakage_warn_only: true
  scaler: standard
  scaling_mode: per_region
  train_ratio: 0.7
  validate_leakage: true
  window_size: 7
run:
  log_dir: benchmark_output\logs
  metrics_dir: benchmark_output\metrics
  output_dir: benchmark_output
  plots_dir: benchmark_output\plots
  run_name: benchmark_run
  save_raw_data: true
  seed: 123
training:
  batch_size: 128
  early_stopping_patience: 8
  epochs: 1
  grad_clip: 1.0
  lr: 0.001
  val_ratio: 0.15
transfer:
  base_lr: 0.0001
  batch_size: 32
  enabled: false
  epochs: 10
  finetune_fraction: 0.1
  freeze_backbone: false
  grad_clip: 1.0
  head_lr: 0.001
  lr: 0.0005
  strategy: full
